  <g opacity="0.46">
    <circle cx="152" cy="224" r="3" fill="#38bdf8"/>
    <circle cx="196" cy="586" r="4" fill="#fb923c"/>
    <circle cx="1210" cy="650" r="3" fill="#a78bfa"/>
    <circle cx="1118" cy="96" r="3" fill="#fb923c"/>
  </g>
</svg>
