      <circle cx="196" cy="82" r="5"/><circle cx="230" cy="104" r="4"/><circle cx="264" cy="146" r="5"/>
      <circle cx="286" cy="184" r="3"/><circle cx="174" cy="186" r="4"/>
    </g>
    <g fill="#38bdf8" opacity="0.82">
      <circle cx="72" cy="72" r="3"/><circle cx="116" cy="204" r="3"/><circle cx="286" cy="68" r="4"/><circle cx="318" cy="122" r="3"/>
    </g>
  </g>

  <g transform="translate(930 472)" fill="none" stroke-linecap="round">
    <path d="M0 78 C66 18 132 20 184 82 C232 138 292 122 344 74" stroke="#38bdf8" stroke-width="3"/>
