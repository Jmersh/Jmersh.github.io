<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Event Horizon Telescope image synthesis</title>
  <desc id="desc">An asymmetric black-hole photon ring floats beside sparse interferometry samples and reconstructed image contours.</desc>
  <defs>
    <radialGradient id="bgA" cx="58%" cy="46%" r="48%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.4"/>
      <stop offset="44%" stop-color="#312e81" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgB" cx="18%" cy="72%" r="42%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="76%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ring" cx="43%" cy="58%" r="58%">
      <stop offset="0%" stop-color="#fff7ad"/>
      <stop offset="38%" stop-color="#fb923c"/>
      <stop offset="64%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="#030712"/>
  <rect width="1400" height="800" fill="url(#bgA)"/>
  <rect width="1400" height="800" fill="url(#bgB)"/>

  <g transform="translate(304 160)" opacity="0.32" fill="none" stroke-linecap="round">
    <path d="M0 262 C92 182 192 182 274 254 C352 322 456 330 546 262" stroke="#38bdf8" stroke-width="2"/>
    <path d="M26 324 C114 264 212 268 304 326 C408 390 486 384 570 326" stroke="#fb923c" stroke-width="2"/>
    <path d="M70 198 C164 120 272 146 356 214 C436 280 512 288 614 224" stroke="#a78bfa" stroke-width="1.7"/>
  </g>

  <g transform="translate(230 130)">
    <g opacity="0.28" fill="none" stroke="#94a3b8" stroke-width="2">
      <ellipse cx="472" cy="270" rx="366" ry="214"/>
      <ellipse cx="472" cy="270" rx="302" ry="174"/>
      <ellipse cx="472" cy="270" rx="230" ry="132"/>
    </g>
    <g filter="url(#blur)" opacity="0.72">
      <path d="M274 312 C330 160 520 126 640 214 C760 302 688 440 524 462 C384 482 236 422 274 312Z" fill="#fb923c"/>
    </g>
    <g filter="url(#soft)">
      <path d="M278 312 C338 152 530 128 648 214 C762 298 700 432 536 460 C386 486 232 424 278 312Z" fill="url(#ring)"/>
      <path d="M364 318 C402 230 512 218 582 270 C652 322 612 402 516 414 C426 426 330 384 364 318Z" fill="#030712"/>
      <path d="M292 368 C380 492 604 482 704 324" fill="none" stroke="#fff7ad" stroke-width="28" stroke-linecap="round" opacity="0.56"/>
      <path d="M318 256 C412 148 574 168 674 256" fill="none" stroke="#fb923c" stroke-width="18" stroke-linecap="round" opacity="0.36"/>
    </g>
  </g>

  <g transform="translate(884 158)" opacity="0.9">
    <rect x="0" y="0" width="360" height="250" rx="24" fill="#020617" fill-opacity="0.58" stroke="#475569" stroke-opacity="0.5"/>
    <g stroke="#334155" stroke-width="1" opacity="0.5">
      <path d="M40 40 H320 M40 90 H320 M40 140 H320 M40 190 H320"/>
      <path d="M80 24 V226 M140 24 V226 M200 24 V226 M260 24 V226"/>
