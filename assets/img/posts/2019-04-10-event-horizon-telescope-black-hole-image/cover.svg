<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Event Horizon Telescope off-axis reconstruction</title>
  <desc id="desc">A black-hole shadow sits off axis beside sparse interferometry samples and contour plates, avoiding a centered medallion layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#180a05"/>
    </linearGradient>
    <radialGradient id="heat" cx="35%" cy="47%" r="38%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ring" cx="42%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#fff7ad"/>
      <stop offset="36%" stop-color="#fb923c"/>
      <stop offset="62%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#heat)"/>

  <g transform="translate(138 164)" filter="url(#soft)">
    <path d="M118 238 C166 80 342 30 500 106 C674 190 658 386 482 460 C326 526 72 408 118 238Z" fill="url(#ring)"/>
    <path d="M218 260 C252 170 356 146 446 194 C542 246 528 358 424 394 C318 430 186 348 218 260Z" fill="#030712"/>
    <path d="M132 332 C230 500 486 500 618 300" fill="none" stroke="#fff7ad" stroke-width="28" stroke-linecap="round" opacity="0.54"/>
    <path d="M178 184 C292 52 488 94 594 210" fill="none" stroke="#fb923c" stroke-width="17" stroke-linecap="round" opacity="0.42"/>
  </g>

  <g transform="translate(790 104)" opacity="0.9">
    <rect x="0" y="0" width="470" height="270" rx="26" fill="#020617" fill-opacity="0.5" stroke="#475569" stroke-opacity="0.48" stroke-width="2"/>
    <g stroke="#334155" stroke-width="1.2" opacity="0.54">
      <path d="M42 50 H428 M42 100 H428 M42 150 H428 M42 200 H428"/>
      <path d="M92 28 V238 M158 28 V238 M224 28 V238 M290 28 V238 M356 28 V238"/>
    </g>
    <g fill="#fb923c">
      <circle cx="108" cy="190" r="5"/><circle cx="146" cy="150" r="4"/><circle cx="184" cy="116" r="3"/>
      <circle cx="236" cy="86" r="5"/><circle cx="286" cy="104" r="4"/><circle cx="334" cy="144" r="5"/>
      <circle cx="372" cy="190" r="4"/><circle cx="224" cy="208" r="3"/>
    </g>
    <g fill="#38bdf8" opacity="0.86">
      <circle cx="80" cy="74" r="3"/><circle cx="132" cy="220" r="3"/><circle cx="392" cy="76" r="4"/><circle cx="418" cy="134" r="3"/>
    </g>
  </g>

  <g transform="translate(742 480)" fill="none" stroke-linecap="round">
    <rect x="0" y="0" width="560" height="170" rx="24" fill="#020617" fill-opacity="0.28" stroke="#475569" stroke-opacity="0.32"/>
    <path d="M44 96 C136 26 228 30 300 96 C366 154 454 150 514 80" stroke="#38bdf8" stroke-width="3"/>
    <path d="M48 126 C154 86 230 102 306 140 C382 178 450 164 520 118" stroke="#fb923c" stroke-width="3"/>
    <path d="M112 48 C190 16 256 42 316 74 C380 108 440 94 500 48" stroke="#a78bfa" stroke-width="2"/>
    <g fill="#e2e8f0" stroke="none">
      <circle cx="44" cy="96" r="4"/><circle cx="300" cy="96" r="5"/><circle cx="514" cy="80" r="4"/>
      <circle cx="306" cy="140" r="5"/><circle cx="520" cy="118" r="4"/><circle cx="316" cy="74" r="4"/>
    </g>
  </g>

  <g opacity="0.36" stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M102 700 C288 618 470 646 642 720"/>
    <path d="M118 108 C306 48 500 70 682 150"/>
  </g>
</svg>
