<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">A black hole image built by computation</title>
  <desc id="desc">An asymmetric ring brighter at the bottom around a dark shadow, fed by telescope dots on the panel edges, beside how the M87 image was made.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#070b14" stop-opacity="1"/><stop offset="78%" stop-color="#070b14" stop-opacity="1"/><stop offset="100%" stop-color="#070b14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#a78bfa" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">ASTRONOMY · IMAGING</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="800">A black hole image built by computation</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">The M87 ring is a computed result, not a snap from a camera.</text>

  <!-- LEFT PANEL -->
  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">RING AND SHADOW</text>

  <!-- telescope dots around panel edges with faint lines to the ring (aperture synthesis) -->
  <g stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1">
    <line x1="190" y1="350" x2="445" y2="452"/>
    <line x1="760" y1="345" x2="505" y2="452"/>
    <line x1="180" y1="560" x2="442" y2="455"/>
    <line x1="775" y1="565" x2="508" y2="455"/>
    <line x1="475" y1="338" x2="475" y2="450"/>
    <line x1="475" y1="572" x2="475" y2="460"/>
  </g>
  <g fill="#fbbf24">
    <circle cx="190" cy="350" r="5"/>
    <circle cx="760" cy="345" r="5"/>
    <circle cx="180" cy="560" r="5"/>
    <circle cx="775" cy="565" r="5"/>
    <circle cx="475" cy="338" r="5"/>
    <circle cx="475" cy="572" r="5"/>
  </g>

  <!-- bright asymmetric ring (annulus) around a dark center -->
  <circle cx="475" cy="455" r="93" fill="none" stroke="url(#sig)" stroke-width="34" stroke-opacity="0.55"/>
  <!-- brighter lower arc -->
  <path d="M 382 455 A 93 93 0 0 0 568 455" fill="none" stroke="url(#sig)" stroke-width="38" stroke-linecap="round"/>
  <path d="M 405 510 A 93 93 0 0 0 545 510" fill="none" stroke="#fbbf24" stroke-width="20" stroke-linecap="round" stroke-opacity="0.92"/>
  <!-- dark shadow center -->
  <circle cx="475" cy="455" r="74" fill="url(#shadow)"/>

  <!-- RIGHT LIST -->
  <text x="872" y="302" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">HOW IT WAS MADE</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#fbbf24"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Eight radio dishes, one array</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#fbbf24"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Atomic-clock timing per site</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#fbbf24"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Correlation &amp; calibration</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#fbbf24"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Independent imaging pipelines</text>

  <!-- FOOTER -->
  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">When several pipelines land on the same ring, <tspan fill="#a78bfa" font-weight="700">the algorithm is part of the instrument</tspan>.</text>
</svg>
