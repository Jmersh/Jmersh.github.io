<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Git forges are critical infrastructure</title>
  <desc id="desc">A portable git repository feeds a central forge hub that fans out to review, CI, security, releases, AI and billing, and project memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.42"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="400" cy="440" rx="380" ry="300" fill="url(#glow)"/>

  <text x="92" y="92" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">SOFTWARE · INFRASTRUCTURE</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="800">Git forges are critical infrastructure now</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">Git is portable. The work around the repository is not.</text>

  <!-- spokes -->
  <g stroke="#3a4a63" stroke-width="2.5" fill="none">
    <path d="M474 432 C600 432 600 262 720 262"/>
    <path d="M474 432 C600 432 600 332 720 332"/>
    <path d="M474 432 C600 432 600 402 720 402"/>
    <path d="M474 432 C600 432 600 472 720 472"/>
    <path d="M474 432 C600 432 600 542 720 542"/>
    <path d="M474 432 C600 432 600 612 720 612"/>
  </g>

  <!-- portable repo -->
  <rect x="100" y="372" width="152" height="116" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="176" y="414" text-anchor="middle" fill="#dfe8f5" font-family="'JetBrains Mono','Consolas',monospace" font-size="21" font-weight="700">git repo</text>
  <text x="176" y="444" text-anchor="middle" fill="#22d3ee" font-family="'JetBrains Mono','Consolas',monospace" font-size="17">$ git clone</text>
  <path d="M150 352 C120 332 104 334 92 346" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 8"/>
  <path d="M92 346 l15 -4 -4 14z" fill="#22d3ee"/>
  <text x="176" y="520" text-anchor="middle" fill="#7e90ad" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="18" font-style="italic">portable</text>

  <path d="M252 432 H290" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

  <!-- forge hub -->
  <circle cx="382" cy="432" r="94" fill="url(#hub)"/>
  <circle cx="382" cy="432" r="94" fill="#0a0f1c" fill-opacity="0.18"/>
  <text x="382" y="424" text-anchor="middle" fill="#ffffff" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="800">Forge</text>
  <text x="382" y="456" text-anchor="middle" fill="#d7e6ff" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17">the hub</text>

  <!-- chips -->
  <g font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" fill="#e3ebf6">
    <rect x="720" y="234" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="262" r="7" fill="#22d3ee"/><text x="778" y="270">Review and pull requests</text>
    <rect x="720" y="304" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="332" r="7" fill="#818cf8"/><text x="778" y="340">CI and Actions minutes</text>
    <rect x="720" y="374" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="402" r="7" fill="#fb7185"/><text x="778" y="410">Security advisories and CVEs</text>
    <rect x="720" y="444" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="472" r="7" fill="#fbbf24"/><text x="778" y="480">Releases and artifacts</text>
    <rect x="720" y="514" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="542" r="7" fill="#22d3ee"/><text x="778" y="550">Copilot, AI review, and billing</text>
    <rect x="720" y="584" width="566" height="56" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.18"/>
    <circle cx="752" cy="612" r="7" fill="#818cf8"/><text x="778" y="620">Issues and project memory</text>
  </g>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23"><tspan fill="#38bdf8" font-weight="700">Forge dependence</tspan> is an architecture decision, not just where the code is hosted.</text>
</svg>
