<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">When coding benchmarks stop measuring progress</title>
  <desc id="desc">A rising benchmark-score line diverges from a flat real-capability line, beside the reasons the gap grows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.38"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>

  <text x="92" y="92" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">AI · EVALUATION</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">When benchmarks stop measuring progress</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">The score keeps climbing. The capability it is supposed to track does not.</text>

  <!-- chart panel -->
  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">REPORTED VS. REAL</text>
  <g stroke="#3a4a63" stroke-width="2" stroke-linecap="round">
    <path d="M170 326 V560"/><path d="M170 560 H792"/>
  </g>
  <!-- gap -->
  <path d="M170 532 L292 500 L414 446 L536 392 L658 342 L792 314 L792 498 L658 503 L536 506 L414 509 L292 512 L170 514 Z" fill="#fb7185" opacity="0.12"/>
  <!-- real capability (flat, muted) -->
  <polyline points="170,514 292,512 414,509 536,506 658,503 792,498" fill="none" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- benchmark score (rising, accent) -->
  <polyline points="170,532 292,500 414,446 536,392 658,342 792,314" fill="none" stroke="url(#sig)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="792" cy="314" r="9" fill="#67e8f9"/>
  <circle cx="792" cy="498" r="9" fill="#64748b"/>
  <text x="452" y="356" fill="#67e8f9" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700">benchmark score</text>
  <text x="300" y="552" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700">real capability</text>

  <!-- causes -->
  <text x="872" y="302" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHY THE GAP GROWS</text>
  <g font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21" fill="#e3ebf6">
    <rect x="868" y="324" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
    <circle cx="898" cy="353" r="6" fill="#fbbf24"/><text x="920" y="360">Contamination and data leakage</text>
    <rect x="868" y="392" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
    <circle cx="898" cy="421" r="6" fill="#fbbf24"/><text x="920" y="428">Narrow tests, not real fixes</text>
    <rect x="868" y="460" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
    <circle cx="898" cy="489" r="6" fill="#fbbf24"/><text x="920" y="496">Underspecified tasks</text>
    <rect x="868" y="528" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
    <circle cx="898" cy="557" r="6" fill="#fbbf24"/><text x="920" y="564">Familiarity, not skill</text>
  </g>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">A score is only useful if it predicts <tspan fill="#38bdf8" font-weight="700">behaviour you would trust</tspan> in a real repository.</text>
</svg>
