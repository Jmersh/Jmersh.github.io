<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">BERT makes pretraining bidirectional</title>
  <desc id="desc">A row of tokens with a masked middle box and context arrows arriving from both the left and the right, beside what BERT adds to language pretraining.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">NLP · PRETRAINING</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">BERT makes pretraining bidirectional</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">Masking lets one encoder read each word from both sides at once.</text>

  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">MASKED LANGUAGE MODELING</text>

  <!-- context arrows converging into the masked center box from both directions -->
  <path d="M206 432 C 300 392, 380 392, 458 426" fill="none" stroke="url(#sig)" stroke-width="3" stroke-opacity="0.85"/>
  <path d="M294 432 C 360 402, 410 402, 460 424" fill="none" stroke="url(#sig)" stroke-width="3" stroke-opacity="0.85"/>
  <path d="M744 432 C 650 392, 570 392, 492 426" fill="none" stroke="url(#sig)" stroke-width="3" stroke-opacity="0.85"/>
  <path d="M656 432 C 590 402, 540 402, 490 424" fill="none" stroke="url(#sig)" stroke-width="3" stroke-opacity="0.85"/>
  <polygon points="458,427 470,420 468,435" fill="#6366f1"/>
  <polygon points="492,427 480,420 482,435" fill="#6366f1"/>

  <!-- token boxes: 6 plain + masked center, middle is [MASK] -->
  <rect x="166" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="206" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">the</text>

  <rect x="254" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="294" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">river</text>

  <rect x="342" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="382" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">runs</text>

  <rect x="430" y="450" width="90" height="76" rx="12" fill="url(#sig)" fill-opacity="0.22" stroke="#67e8f9" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="475" y="496" fill="#67e8f9" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="800" text-anchor="middle">[MASK]</text>

  <rect x="528" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="568" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">to</text>

  <rect x="616" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="656" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">the</text>

  <rect x="704" y="458" width="80" height="60" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="744" y="495" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle">sea</text>

  <text x="475" y="566" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="600" text-anchor="middle" font-style="italic">both-direction context</text>

  <text x="872" y="302" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHAT BERT ADDS</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="898" cy="353" r="6" fill="#fbbf24"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Masked language modeling</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="898" cy="421" r="6" fill="#fbbf24"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Next sentence prediction</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="898" cy="489" r="6" fill="#fbbf24"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Deep two-way encoder</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="898" cy="557" r="6" fill="#fbbf24"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">One base, tuned per task</text>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">Masking blocks the leak so the encoder can <tspan fill="#38bdf8" font-weight="700">read both sides at once</tspan>.</text>
</svg>
