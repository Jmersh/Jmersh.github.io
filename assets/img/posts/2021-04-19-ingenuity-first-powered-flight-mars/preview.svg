<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Mars helicopter autonomous flight</title>
  <desc id="desc">A small helicopter rises over a Martian terrain grid with delayed communication pulses crossing the sky.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#130b10"/>
      <stop offset=".48" stop-color="#27120d"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <radialGradient id="dust" cx="45%" cy="60%" r="60%">
      <stop offset="0" stop-color="#ff8d4d" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ff8d4d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#dust)"/>
  <g transform="translate(0 585)" fill="none" stroke="#8f4932" stroke-width="2" opacity=".5">
