  </g>
  <g transform="translate(535 220)" filter="url(#glow)">
    <ellipse cx="165" cy="0" rx="265" ry="32" fill="none" stroke="#ffc56d" stroke-width="5"/>
    <ellipse cx="165" cy="0" rx="150" ry="18" fill="none" stroke="#ff6a3d" stroke-width="4" opacity=".8"/>
    <rect x="110" y="96" width="110" height="74" rx="18" fill="#161a22" stroke="#ffd28b" stroke-width="4"/>
    <path d="M165 32 V96" stroke="#ffd28b" stroke-width="6" stroke-linecap="round"/>
    <path d="M92 132 H238" stroke="#ff8d4d" stroke-width="7" stroke-linecap="round"/>
    <path d="M128 170 L98 234 M202 170 L232 234" stroke="#ffd28b" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g fill="none" stroke-linecap="round">
