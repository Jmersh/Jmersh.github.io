    <path d="M104 230 C248 178 372 182 506 232" fill="none" stroke="#62d7ff" stroke-width="3" opacity=".55"/>
    <circle cx="104" cy="180" r="9" fill="#62d7ff"/>
    <circle cx="506" cy="170" r="9" fill="#62d7ff"/>
    <rect x="86" y="252" width="128" height="54" rx="18" fill="#101820" stroke="#62d7ff" stroke-width="3"/>
