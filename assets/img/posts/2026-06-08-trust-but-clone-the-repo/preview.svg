<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Trust, but clone the repo</title>
  <desc id="desc">A paper makes a claim; the repository is where the claim is rerun against data, sorted into verified, unverified, and falsified.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="560" cy="430" rx="480" ry="290" fill="url(#glow)"/>

  <text x="92" y="92" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">RESEARCH INTEGRITY</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">Trust, but clone the repo</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">A paper is a claim. The repository is where it meets the data.</text>

  <!-- paper panel -->
  <rect x="108" y="268" width="320" height="300" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="314" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">PAPER</text>
  <g fill="#43536b">
    <rect x="138" y="338" width="222" height="12" rx="6"/>
    <rect x="138" y="368" width="258" height="12" rx="6"/>
    <rect x="138" y="398" width="186" height="12" rx="6"/>
  </g>
  <rect x="138" y="444" width="260" height="44" rx="10" fill="#6366f1" fill-opacity="0.16"/>
  <text x="158" y="472" fill="#a5b4fc" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="700">"discourse intensified"</text>
  <text x="138" y="524" fill="#7e90ad" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17">a claim, fluently stated</text>

  <!-- arrow -->
  <path d="M446 418 H496" stroke="url(#sig)" stroke-width="6" stroke-linecap="round"/>
  <path d="M496 418 l-20 -11 v22 z" fill="#6366f1"/>

  <!-- repo terminal -->
  <rect x="514" y="252" width="386" height="332" rx="20" fill="#070b14" stroke="url(#sig)" stroke-width="2"/>
  <circle cx="544" cy="284" r="6" fill="#fb7185"/><circle cx="566" cy="284" r="6" fill="#fbbf24"/><circle cx="588" cy="284" r="6" fill="#34d399"/>
  <text x="544" y="290" fill="#070b14" font-size="1">.</text>
  <g font-family="'JetBrains Mono','Consolas',monospace" font-size="22" fill="#cdd9ea">
    <text x="544" y="356"><tspan fill="#22d3ee">$</tspan> git clone</text>
    <text x="544" y="404"><tspan fill="#22d3ee">$</tspan> read data</text>
    <text x="544" y="452"><tspan fill="#22d3ee">$</tspan> rerun checks</text>
  </g>
  <text x="544" y="528" fill="#7e90ad" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17">reproduce it, do not take it on faith</text>

  <!-- tiers -->
  <text x="966" y="296" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">CONFIDENCE TIERS</text>
  <g font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23" font-weight="700">
    <rect x="966" y="320" width="318" height="62" rx="14" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5"/>
    <path d="M992 351 l12 12 22 -26" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1040" y="359" fill="#6ee7b7">Verified</text>

    <rect x="966" y="396" width="318" height="62" rx="14" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.5"/>
    <text x="1003" y="436" fill="#fbbf24" font-size="30">?</text>
    <text x="1040" y="435" fill="#fcd34d">Unverified</text>

    <rect x="966" y="472" width="318" height="62" rx="14" fill="#fb7185" fill-opacity="0.12" stroke="#fb7185" stroke-opacity="0.5"/>
    <path d="M998 489 l24 24 M1022 489 l-24 24" stroke="#fb7185" stroke-width="5" stroke-linecap="round"/>
    <text x="1040" y="511" fill="#fca5b5">Falsified</text>
  </g>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23"><tspan fill="#38bdf8" font-weight="700">Confidence tiers</tspan> beat confident prose. Demand the artifact, not the description of it.</text>
</svg>
