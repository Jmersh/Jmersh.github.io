<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">AlphaFold 2 enters the toolchain</title>
  <desc id="desc">Two backbone-accuracy bars in angstroms, AlphaFold 2 at 0.96 far lower than the next best at 2.8, beside what shipped with the release.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#34d399" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">AI · STRUCTURAL BIOLOGY</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">AlphaFold 2 enters the toolchain</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">A paper and code release turn a benchmark result into a usable tool.</text>

  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">BACKBONE ACCURACY · LOWER IS BETTER</text>

  <!-- y axis: 0-3 angstroms, baseline y=560, 3A at y=360 (66.7px per A) -->
  <line x1="300" y1="356" x2="300" y2="560" stroke="#94a3b8" stroke-opacity="0.30" stroke-width="1.5"/>
  <line x1="296" y1="560" x2="300" y2="560" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="288" y="566" fill="#7e93b0" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="15" text-anchor="end">0 &#197;</text>
  <line x1="296" y1="493" x2="300" y2="493" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="288" y="499" fill="#7e93b0" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="15" text-anchor="end">1 &#197;</text>
  <line x1="296" y1="427" x2="300" y2="427" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="288" y="433" fill="#7e93b0" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="15" text-anchor="end">2 &#197;</text>
  <line x1="296" y1="360" x2="300" y2="360" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="288" y="366" fill="#7e93b0" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="15" text-anchor="end">3 &#197;</text>

  <!-- baseline -->
  <line x1="300" y1="560" x2="782" y2="560" stroke="#94a3b8" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- Bar 1: AlphaFold 2 = 0.96 A -> height 64, top y=496 -->
  <rect x="380" y="496" width="124" height="64" rx="6" fill="url(#sig)"/>
  <text x="442" y="485" fill="#6ee7b7" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25" font-weight="800" text-anchor="middle">0.96 &#197;</text>
  <text x="442" y="584" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">AlphaFold 2</text>

  <!-- Bar 2: next best = 2.8 A -> height 187, top y=373 -->
  <rect x="588" y="373" width="124" height="187" rx="6" fill="#5b6678" fill-opacity="0.85"/>
  <text x="650" y="362" fill="#9fb0c6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25" font-weight="800" text-anchor="middle">2.8 &#197;</text>
  <text x="650" y="584" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="600" text-anchor="middle">next best</text>

  <text x="872" y="302" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHAT SHIPPED</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#fbbf24"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Peer-reviewed Nature paper</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#fbbf24"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Public code on GitHub</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#fbbf24"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Per-residue pLDDT score</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#fbbf24"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Tested beyond CASP14</text>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">The benchmark announced the result; <tspan fill="#34d399" font-weight="700">the paper and code hand it to the field</tspan>.</text>
</svg>
