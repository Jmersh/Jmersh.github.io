<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Log4Shell dependency blast radius</title>
  <desc id="desc">A cracked logging package emits a red-orange blast wave through stacked dependency layers and scattered service tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b10"/>
      <stop offset="54%" stop-color="#210b12"/>
      <stop offset="100%" stop-color="#120f08"/>
    </linearGradient>
    <radialGradient id="blast" cx="38%" cy="50%" r="54%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.56"/>
      <stop offset="36%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0b0b10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="34%" stop-color="#ef4444"/>
      <stop offset="72%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#blast)"/>

  <g transform="translate(138 180) rotate(-5 170 220)" filter="url(#soft)">
    <rect x="0" y="0" width="340" height="432" rx="34" fill="#140f12" stroke="#f59e0b" stroke-width="3" stroke-opacity="0.76"/>
    <path d="M172 0 L142 92 L184 150 L132 238 L182 306 L150 432" fill="none" stroke="#fee2e2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#7f1d1d" opacity="0.74">
      <rect x="58" y="76" width="178" height="20" rx="10"/>
      <rect x="58" y="124" width="238" height="20" rx="10"/>
      <rect x="58" y="172" width="142" height="20" rx="10"/>
      <rect x="58" y="264" width="218" height="68" rx="16"/>
    </g>
    <g stroke="#fee2e2" stroke-width="5" stroke-linecap="round" opacity="0.82">
      <path d="M84 290 H214"/>
      <path d="M84 312 H178"/>
    </g>
  </g>

  <g opacity="0.74" fill="none" stroke-linecap="round">
    <path d="M450 360 C620 274 760 242 960 232 C1080 226 1190 238 1280 266" stroke="url(#heat)" stroke-width="8"/>
    <path d="M452 398 C656 382 806 382 984 412 C1124 436 1200 470 1288 526" stroke="url(#heat)" stroke-width="6"/>
    <path d="M448 438 C588 530 748 590 948 606 C1090 618 1210 594 1298 552" stroke="url(#heat)" stroke-width="5"/>
  </g>

  <g transform="translate(600 170)" opacity="0.94">
    <g fill="#020617" fill-opacity="0.62" stroke="#64748b" stroke-opacity="0.54" stroke-width="2">
      <rect x="0" y="0" width="162" height="74" rx="18"/>
      <rect x="236" y="34" width="190" height="74" rx="18"/>
      <rect x="82" y="154" width="212" height="74" rx="18"/>
      <rect x="386" y="188" width="172" height="74" rx="18"/>
      <rect x="34" y="324" width="178" height="74" rx="18"/>
      <rect x="292" y="360" width="244" height="74" rx="18"/>
    </g>
    <g stroke="#334155" stroke-width="3" fill="none" opacity="0.6">
      <path d="M162 38 C202 40 216 58 236 70"/>
      <path d="M184 108 C156 126 126 138 112 154"/>
      <path d="M294 192 C328 194 360 204 386 224"/>
      <path d="M176 228 C138 260 112 290 102 324"/>
      <path d="M260 228 C292 276 330 314 382 360"/>
    </g>
    <g fill="#f8fafc">
      <circle cx="68" cy="37" r="8" fill="#ef4444"/>
      <circle cx="318" cy="71" r="7" fill="#f59e0b"/>
      <circle cx="176" cy="191" r="7" fill="#94a3b8"/>
      <circle cx="472" cy="225" r="8" fill="#ef4444"/>
      <circle cx="108" cy="361" r="7" fill="#f59e0b"/>
      <circle cx="414" cy="397" r="8" fill="#94a3b8"/>
    </g>
  </g>

  <g opacity="0.44" fill="none" stroke="#ef4444" stroke-width="2">
    <path d="M394 402 C520 270 700 198 906 164"/>
    <path d="M384 430 C554 506 730 548 966 556"/>
    <path d="M390 390 C584 380 778 384 1044 438"/>
  </g>

  <g fill="#f59e0b" opacity="0.72">
    <path d="M536 276 l18 34 -38 -4z"/>
    <path d="M758 548 l24 26 -40 8z" fill="#ef4444"/>
    <path d="M1078 298 l26 22 -34 16z"/>
    <circle cx="1188" cy="620" r="5" fill="#ef4444"/>
    <circle cx="560" cy="620" r="4"/>
    <circle cx="1240" cy="164" r="4"/>
  </g>
</svg>
