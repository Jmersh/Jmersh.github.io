<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Log4Shell: one log line to RCE</title>
  <desc id="desc">A left-to-right exploit chain showing how a logged string becomes a JNDI lookup, an attacker LDAP fetch, and remote class loading, beside the key facts to know about CVE-2021-44228.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b91c1c" stop-opacity="0.35"/><stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L6 3 L0 6 Z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#fb7185" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">SECURITY · SUPPLY CHAIN</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">Log4Shell: one log line to RCE</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">A logging library flaw becomes a supply-chain inventory emergency.</text>

  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">EXPLOIT CHAIN</text>

  <!-- chain of 4 stacked boxes inside x:150-800 y:320-585 -->
  <rect x="184" y="338" width="556" height="46" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="462" y="367" text-anchor="middle" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="600">logged string</text>
  <line x1="462" y1="384" x2="462" y2="412" stroke="url(#sig)" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="184" y="418" width="556" height="46" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="462" y="447" text-anchor="middle" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="600">JNDI lookup</text>
  <line x1="462" y1="464" x2="462" y2="492" stroke="url(#sig)" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="184" y="498" width="556" height="46" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="462" y="527" text-anchor="middle" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="600">attacker LDAP</text>
  <line x1="462" y1="544" x2="462" y2="572" stroke="url(#sig)" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="184" y="578" width="556" height="46" rx="12" fill="#ef4444" fill-opacity="0.16" stroke="#fb7185" stroke-opacity="0.85" stroke-width="2"/>
  <text x="462" y="607" text-anchor="middle" fill="#fda4af" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700">remote class load</text>

  <text x="872" y="302" fill="#fb923c" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHAT TO KNOW</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#fb923c"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">CVE-2021-44228, CVSS 10.0</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#fb923c"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Logged input triggers lookups</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#fb923c"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Affects Log4j Core 2.x</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#fb923c"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">2.15.0 fixes Java 8</text>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">The real fix starts with one question: <tspan fill="#fb7185" font-weight="700">know what you run</tspan> before a crisis forces it.</text>
</svg>
