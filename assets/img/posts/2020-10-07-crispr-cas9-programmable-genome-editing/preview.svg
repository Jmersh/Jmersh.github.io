<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">CRISPR programmable editing</title>
  <desc id="desc">A guide RNA rail aligns a Cas9 cutting shape with a DNA strand over a dark botanical gradient.</desc>
  <defs>
    <radialGradient id="bg" cx="56%" cy="50%" r="72%">
      <stop offset="0" stop-color="#153622"/>
      <stop offset=".5" stop-color="#081914"/>
      <stop offset="1" stop-color="#050909"/>
    </radialGradient>
    <linearGradient id="dna" x1="0" x2="1">
      <stop offset="0" stop-color="#65f0a2"/>
      <stop offset=".48" stop-color="#ffe66d"/>
      <stop offset="1" stop-color="#ff6ea8"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <g opacity=".28" fill="none" stroke="#2d6d52" stroke-width="2">
    <path d="M60 168 C260 95 430 160 612 265 C820 385 1005 442 1338 336"/>
    <path d="M92 646 C328 522 472 574 686 626 C902 680 1058 548 1330 604"/>
