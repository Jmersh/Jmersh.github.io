    <path d="M0 315 C130 455 265 455 390 315 S650 175 780 315 S1040 455 1180 315" fill="none" stroke="url(#dna)" stroke-width="9" stroke-linecap="round" opacity=".72"/>
    <g stroke="#b9ffd6" stroke-width="4" opacity=".75">
      <path d="M92 178 L92 380"/><path d="M180 132 L180 426"/><path d="M280 158 L280 400"/>
      <path d="M500 370 L500 190"/><path d="M610 432 L610 128"/><path d="M720 368 L720 192"/>
      <path d="M930 160 L930 398"/><path d="M1042 125 L1042 432"/>
    </g>
  </g>
  <g transform="translate(462 198)">
