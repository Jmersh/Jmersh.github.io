<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">DART tests asteroid deflection</title>
  <desc id="desc">A spacecraft strikes the moonlet Dimorphos on its dashed orbit around Didymos, with a faint shifted orbit and a question mark because the orbit change is not yet measured, beside the key facts of the test.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#a78bfa" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">SPACE · PLANETARY DEFENSE</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">DART tests asteroid deflection</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">A kinetic impact whose real payoff is the measurement that follows.</text>
  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">KINETIC IMPACT</text>

  <!-- Didymos: large primary body -->
  <circle cx="430" cy="455" r="64" fill="url(#sig)" fill-opacity="0.92"/>
  <text x="430" y="545" fill="#cdd6ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" text-anchor="middle">Didymos</text>

  <!-- Original orbit of Dimorphos (dashed) -->
  <ellipse cx="430" cy="455" rx="158" ry="98" fill="none" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="7 7"/>

  <!-- Faint shifted orbit suggesting an unmeasured change -->
  <ellipse cx="430" cy="455" rx="142" ry="86" fill="none" stroke="#fbbf24" stroke-opacity="0.30" stroke-width="2" stroke-dasharray="4 8"/>

  <!-- Dimorphos: small moonlet on the orbit (right side) -->
  <circle cx="588" cy="455" r="20" fill="#fbbf24"/>
  <text x="588" y="410" fill="#fbe7b0" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">Dimorphos</text>

  <!-- Spacecraft dot and impact arrow striking Dimorphos -->
  <circle cx="732" cy="455" r="7" fill="#eef3fb"/>
  <line x1="724" y1="455" x2="616" y2="455" stroke="#eef3fb" stroke-width="3"/>
  <path d="M616 455 L632 448 L632 462 Z" fill="#eef3fb"/>

  <!-- Question mark: result not yet measured -->
  <text x="588" y="566" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="34" font-weight="800" text-anchor="middle">?</text>

  <text x="872" y="302" fill="#fbbf24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">THE TEST</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#fbbf24"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">First planetary defense test</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#fbbf24"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Kinetic impact on Dimorphos</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#fbbf24"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Autonomous terminal guidance</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fbbf24" fill-opacity="0.09" stroke="#fbbf24" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#fbbf24"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Orbit change to be measured</text>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">The impact is only step one; the value comes from <tspan fill="#a78bfa" font-weight="700">measuring the orbit change</tspan>.</text>
</svg>
