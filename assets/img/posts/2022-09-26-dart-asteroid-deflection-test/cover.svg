<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">DART planetary defense test</title>
  <desc id="desc">A spacecraft's impact path intersects a small asteroid moon while observation arcs measure orbital change.</desc>
  <defs>
    <radialGradient id="bg" cx="68%" cy="46%" r="78%">
      <stop offset="0" stop-color="#2b163f"/>
      <stop offset=".48" stop-color="#0c1022"/>
      <stop offset="1" stop-color="#06070d"/>
    </radialGradient>
    <linearGradient id="path" x1="0" x2="1">
      <stop offset="0" stop-color="#33e6ff"/>
      <stop offset=".55" stop-color="#f6d35f"/>
      <stop offset="1" stop-color="#ff5f86"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <g transform="translate(760 260)">
    <ellipse cx="190" cy="130" rx="330" ry="160" fill="none" stroke="#5967a7" stroke-width="3" opacity=".45"/>
    <ellipse cx="190" cy="130" rx="430" ry="210" fill="none" stroke="#5967a7" stroke-width="2" opacity=".28"/>
    <path d="M-80 266 C142 94 398 26 632 40" fill="none" stroke="#33e6ff" stroke-width="3" stroke-dasharray="10 18" opacity=".65"/>
    <g filter="url(#glow)">
      <path d="M440 110 C490 88 548 112 566 166 C586 228 532 282 468 270 C410 258 384 206 404 154 C412 132 424 120 440 110Z" fill="#2b203b" stroke="#f6d35f" stroke-width="5"/>
      <path d="M210 118 C248 100 294 118 306 160 C320 210 276 252 226 238 C182 226 166 184 184 148 C190 136 200 126 210 118Z" fill="#19182c" stroke="#ff5f86" stroke-width="4"/>
    </g>
    <path d="M170 172 L128 144 L142 198 Z" fill="#f6d35f"/>
    <path d="M116 148 L18 108" stroke="url(#path)" stroke-width="5" stroke-linecap="round"/>
    <path d="M115 197 L12 234" stroke="url(#path)" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    <circle cx="184" cy="168" r="18" fill="#fff4bf" filter="url(#glow)"/>
  </g>
  <g transform="translate(150 155)" opacity=".96">
    <path d="M0 260 C168 112 350 58 548 84" fill="none" stroke="url(#path)" stroke-width="6" stroke-linecap="round"/>
    <path d="M42 248 L0 260 L24 222" fill="none" stroke="#33e6ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(506 72) rotate(12)">
      <path d="M0 0 L82 30 L20 72 Z" fill="#0f1727" stroke="#33e6ff" stroke-width="4"/>
      <path d="M20 72 L-30 108 M82 30 L136 50" stroke="#f6d35f" stroke-width="4" stroke-linecap="round"/>
      <rect x="22" y="-28" width="76" height="22" rx="11" fill="#18233b" stroke="#ff5f86" stroke-width="3"/>
    </g>
  </g>
  <g fill="none" stroke="#f6d35f" stroke-width="3" opacity=".7">
    <path d="M154 552 C242 520 326 530 418 570"/>
    <path d="M160 606 C260 570 366 582 468 642"/>
    <circle cx="154" cy="552" r="7" fill="#f6d35f"/>
    <circle cx="468" cy="642" r="7" fill="#f6d35f"/>
  </g>
</svg>
