<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">It is about the data, not the benchmark</title>
  <desc id="desc">An opaque LLM agent loop is contrasted with a structured pipeline: question to AQL plan to source wrappers to an auditable answer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="700" cy="500" rx="560" ry="240" fill="url(#glow)"/>

  <text x="92" y="92" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">AI · DATA ARCHITECTURE</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">It is about the data, not the benchmark</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">Enterprise questions fail at the data boundary before the reasoning boundary.</text>

  <!-- lane A: opaque agent loop (muted) -->
  <text x="110" y="266" fill="#7e90ad" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3">INSTEAD OF AN OPAQUE LOOP</text>
  <g opacity="0.6">
    <rect x="110" y="282" width="210" height="60" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#64748b" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="215" y="318" text-anchor="middle" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="20">LLM agent loop</text>
    <path d="M150 282 C150 250 280 250 280 282" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="3 7"/>
    <path d="M280 282 l4 -12 -12 2 z" fill="#64748b"/>
    <g stroke="#64748b" stroke-width="2" stroke-dasharray="3 7" fill="none" opacity="0.8">
      <path d="M320 312 H400"/><path d="M320 312 C 380 290 380 360 440 350"/><path d="M320 312 C 380 334 400 300 470 318"/>
    </g>
    <g fill="#64748b"><circle cx="410" cy="312" r="9"/><circle cx="452" cy="350" r="9"/><circle cx="482" cy="318" r="9"/></g>
    <text x="520" y="318" fill="#7e90ad" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="19">guess, call a tool, repeat, hope it sticks</text>
  </g>

  <!-- lane B: structured pipeline (accent) -->
  <text x="110" y="404" fill="#38bdf8" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="3">RUBICON: STRUCTURE THE QUERY</text>

  <g font-family="Inter,'Segoe UI',system-ui,sans-serif">
    <rect x="110" y="424" width="150" height="84" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="185" y="473" text-anchor="middle" fill="#dfe8f5" font-size="22" font-weight="700">Question</text>

    <rect x="300" y="424" width="196" height="84" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="url(#sig)" stroke-width="2"/>
    <text x="398" y="464" text-anchor="middle" fill="#eef3fb" font-size="22" font-weight="800">AQL plan</text>
    <text x="398" y="490" text-anchor="middle" fill="#8ea3bf" font-size="15">what to fetch, from where</text>

    <rect x="536" y="424" width="300" height="84" rx="16" fill="#ffffff" fill-opacity="0.06" stroke="url(#sig)" stroke-width="2"/>
    <text x="560" y="458" fill="#eef3fb" font-size="22" font-weight="800">Source wrappers</text>
    <text x="560" y="488" fill="#9fb3cf" font-size="15">warehouse · documents · API · email</text>

    <rect x="876" y="424" width="300" height="84" rx="16" fill="#34d399" fill-opacity="0.10" stroke="#34d399" stroke-opacity="0.6" stroke-width="2"/>
    <path d="M902 466 l14 14 26 -32" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="958" y="474" fill="#6ee7b7" font-size="22" font-weight="800">Auditable answer</text>
  </g>

  <g stroke="url(#sig)" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M260 466 H300"/><path d="M496 466 H536"/><path d="M836 466 H876"/>
  </g>
  <g fill="#6366f1"><path d="M300 466 l-18 -10 v20 z"/><path d="M536 466 l-18 -10 v20 z"/><path d="M876 466 l-18 -10 v20 z"/></g>

  <g font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="18" fill="#cdd9ea">
    <g><circle cx="120" cy="560" r="5" fill="#818cf8"/><text x="136" y="566">visible intermediate results</text></g>
    <g><circle cx="430" cy="560" r="5" fill="#818cf8"/><text x="446" y="566">permissions and provenance</text></g>
    <g><circle cx="800" cy="560" r="5" fill="#818cf8"/><text x="816" y="566">cost-based planning</text></g>
  </g>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">Agents need a real <tspan fill="#38bdf8" font-weight="700">data architecture</tspan> underneath them, not a higher benchmark score.</text>
</svg>
