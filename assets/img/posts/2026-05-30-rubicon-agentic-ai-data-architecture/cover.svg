<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-label="Scattered data points resolving into ordered lanes through a luminous gate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06130d"/><stop offset="100%" stop-color="#0a1c15"/>
    </linearGradient>
    <radialGradient id="gateglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.55"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <ellipse cx="700" cy="394" rx="320" ry="430" fill="url(#gateglow)"/>

  <!-- scattered (chaos) left -->
  <g fill="none" stroke="#1f6b4f" stroke-width="1.4" opacity="0.6">
    <path d="M150 250 L700 360 M210 330 L700 372 M120 430 L700 384 M260 470 L700 396 M180 560 L700 408 M300 210 L700 360 M340 600 L700 420 M120 360 L700 388"/>
  </g>
  <g>
    <circle cx="150" cy="250" r="12" fill="#0f3d2c" stroke="#34d399" stroke-width="1.5"/>
    <rect x="198" y="318" width="22" height="22" rx="4" fill="#0f3d2c" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="120" cy="430" r="9" fill="#155e44"/>
    <path d="M260 458 l14 24 -28 0 z" fill="#0f3d2c" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="180" cy="560" r="14" fill="#0f3d2c" stroke="#2dd4bf" stroke-width="1.5"/>
    <rect x="290" y="198" width="16" height="16" rx="3" fill="#155e44"/>
    <circle cx="340" cy="600" r="8" fill="#155e44"/>
    <rect x="110" y="350" width="18" height="18" rx="3" fill="#0f3d2c" stroke="#2dd4bf" stroke-width="1.3"/>
    <circle cx="420" cy="300" r="7" fill="#1b7a59"/>
    <circle cx="470" cy="520" r="9" fill="#1b7a59"/>
    <rect x="380" y="430" width="13" height="13" rx="3" fill="#1b7a59"/>
  </g>

  <!-- the gate -->
  <rect x="690" y="150" width="20" height="488" rx="10" fill="#6ee7b7" filter="url(#soft)"/>
  <rect x="695" y="150" width="10" height="488" rx="5" fill="#ecfdf5"/>

  <!-- ordered (structure) right -->
  <g>
    <g fill="none" stroke="#34d399" stroke-width="2" opacity="0.85">
      <path d="M710 372 H1280"/><path d="M710 396 H1280"/><path d="M710 420 H1280"/>
      <path d="M710 348 H1180"/><path d="M710 444 H1180"/>
    </g>
    <g fill="#6ee7b7">
      <circle cx="860" cy="348" r="5"/><circle cx="1000" cy="348" r="5"/><circle cx="1140" cy="348" r="5"/>
      <circle cx="820" cy="372" r="5"/><circle cx="980" cy="372" r="5"/><circle cx="1140" cy="372" r="5"/><circle cx="1280" cy="372" r="6"/>
      <circle cx="860" cy="396" r="5"/><circle cx="1020" cy="396" r="5"/><circle cx="1180" cy="396" r="5"/><circle cx="1280" cy="396" r="6"/>
      <circle cx="820" cy="420" r="5"/><circle cx="980" cy="420" r="5"/><circle cx="1140" cy="420" r="5"/><circle cx="1280" cy="420" r="6"/>
      <circle cx="900" cy="444" r="5"/><circle cx="1060" cy="444" r="5"/>
    </g>
  </g>
</svg>
