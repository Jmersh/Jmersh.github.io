<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">The xz backdoor: trust is a build artifact</title>
  <desc id="desc">A four-stage pipeline from source repo to sshd, with the release tarball stage flagged as where the hidden code entered, beside four facts to know.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.35"/><stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#fb923c" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">SECURITY · SUPPLY CHAIN</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="46" font-weight="800">The xz backdoor: trust is a build artifact</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">The installed artifact no longer has to match the source you reviewed.</text>

  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHERE TRUST BROKE</text>

  <!-- pipeline: stays inside x:150-800 y:320-585 -->
  <g font-family="Inter,'Segoe UI',system-ui,sans-serif">
    <!-- stage 1: source repo -->
    <rect x="158" y="420" width="138" height="78" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="2"/>
    <text x="227" y="455" fill="#cdd9ea" font-size="18" font-weight="700" text-anchor="middle">source</text>
    <text x="227" y="478" fill="#cdd9ea" font-size="18" font-weight="700" text-anchor="middle">repo</text>

    <!-- arrow 1 -->
    <path d="M300 459 H334" fill="none" stroke="url(#sig)" stroke-width="5" stroke-linecap="round"/>
    <path d="M331 451 L345 459 L331 467 Z" fill="#ef4444"/>

    <!-- stage 2: release tarball (FLAGGED) -->
    <rect x="350" y="420" width="150" height="78" rx="14" fill="#ef4444" fill-opacity="0.14" stroke="#fda4af" stroke-width="2.5"/>
    <text x="425" y="455" fill="#fda4af" font-size="18" font-weight="800" text-anchor="middle">release</text>
    <text x="425" y="478" fill="#fda4af" font-size="18" font-weight="800" text-anchor="middle">tarball</text>
    <!-- danger marker on the tarball -->
    <circle cx="491" cy="429" r="13" fill="#ef4444"/>
    <text x="491" y="436" fill="#0f1a30" font-size="20" font-weight="800" text-anchor="middle">!</text>
    <text x="425" y="372" fill="#fda4af" font-size="16" font-weight="700" text-anchor="middle">hidden code enters here</text>

    <!-- arrow 2 -->
    <path d="M504 459 H538" fill="none" stroke="url(#sig)" stroke-width="5" stroke-linecap="round"/>
    <path d="M535 451 L549 459 L535 467 Z" fill="#ef4444"/>

    <!-- stage 3: build -->
    <rect x="554" y="420" width="118" height="78" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="2"/>
    <text x="613" y="455" fill="#cdd9ea" font-size="18" font-weight="700" text-anchor="middle">build</text>
    <text x="613" y="478" fill="#8ea3bf" font-size="13" font-weight="600" text-anchor="middle">build-time trigger</text>

    <!-- arrow 3 -->
    <path d="M676 459 H710" fill="none" stroke="url(#sig)" stroke-width="5" stroke-linecap="round"/>
    <path d="M707 451 L721 459 L707 467 Z" fill="#ef4444"/>

    <!-- stage 4: sshd -->
    <rect x="726" y="420" width="64" height="78" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="2"/>
    <text x="758" y="466" fill="#cdd9ea" font-size="18" font-weight="700" text-anchor="middle">sshd</text>

    <text x="474" y="556" fill="#8ea3bf" font-size="15" font-weight="600" text-anchor="middle">via liblzma pulled into the sshd process</text>
  </g>

  <text x="872" y="302" fill="#fb923c" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">WHAT TO KNOW</text>

  <rect x="868" y="324" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#fb923c"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Tainted xz 5.6.0 and 5.6.1</text>

  <rect x="868" y="392" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#fb923c"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Tracked as CVE-2024-3094</text>

  <rect x="868" y="460" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#fb923c"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Payload fires at build time</text>

  <rect x="868" y="528" width="424" height="58" rx="14" fill="#fb923c" fill-opacity="0.09" stroke="#fb923c" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#fb923c"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Found by Andres Freund</text>

  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">Code review is no longer enough; the real defense is <tspan fill="#fb923c" font-weight="700">artifact review and reproducible builds</tspan>.</text>
</svg>
