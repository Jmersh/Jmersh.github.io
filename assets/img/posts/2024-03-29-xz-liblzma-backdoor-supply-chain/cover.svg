<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Compromised build artifact</title>
  <desc id="desc">A release tarball fractures into build-script layers and a guarded SSH boundary, suggesting a supply-chain compromise.</desc>
  <defs>
    <radialGradient id="bg" cx="46%" cy="50%" r="72%">
      <stop offset="0" stop-color="#3a1420"/>
      <stop offset=".48" stop-color="#140d14"/>
      <stop offset="1" stop-color="#070709"/>
    </radialGradient>
    <linearGradient id="warn" x1="0" x2="1">
      <stop offset="0" stop-color="#ff4d64"/>
      <stop offset=".5" stop-color="#ffb547"/>
      <stop offset="1" stop-color="#53e6c2"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <g transform="translate(120 170)">
    <path d="M70 0 H430 L520 88 V420 H70 Z" fill="#140f15" stroke="#ffb547" stroke-width="3"/>
    <path d="M430 0 V88 H520" fill="none" stroke="#ffb547" stroke-width="3"/>
    <path d="M138 92 H330 M138 138 H390 M138 184 H292" stroke="#7c5330" stroke-width="14" stroke-linecap="round"/>
    <path d="M302 238 L270 288 L322 314 L290 374" fill="none" stroke="#ff4d64" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <rect x="122" y="260" width="168" height="54" rx="18" fill="#251016" stroke="#ff4d64" stroke-width="3"/>
    <rect x="332" y="330" width="116" height="38" rx="14" fill="#241910" stroke="#ffb547" stroke-width="3"/>
  </g>
  <g transform="translate(690 150)">
    <path d="M0 62 H420" stroke="#38465f" stroke-width="4"/>
    <path d="M0 160 H420" stroke="#38465f" stroke-width="4"/>
    <path d="M0 258 H420" stroke="#38465f" stroke-width="4"/>
    <path d="M0 356 H420" stroke="#38465f" stroke-width="4"/>
    <g fill="#111820" stroke-width="3">
      <rect x="42" y="28" width="160" height="68" rx="18" stroke="#53e6c2"/>
      <rect x="126" y="126" width="210" height="68" rx="18" stroke="#ffb547"/>
      <rect x="70" y="224" width="174" height="68" rx="18" stroke="#ff4d64"/>
      <rect x="190" y="322" width="188" height="68" rx="18" stroke="#53e6c2"/>
    </g>
    <path d="M210 62 C258 84 268 128 230 160 C190 194 198 226 252 258 C308 290 306 326 258 356" fill="none" stroke="url(#warn)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  </g>
  <g transform="translate(1065 300)" filter="url(#glow)">
    <path d="M0 138 V74 C0 24 38 0 82 0 C126 0 164 24 164 74 V138" fill="none" stroke="#53e6c2" stroke-width="10" stroke-linecap="round"/>
    <rect x="-28" y="126" width="220" height="150" rx="28" fill="#111820" stroke="#53e6c2" stroke-width="5"/>
    <path d="M82 172 V226" stroke="#ffb547" stroke-width="10" stroke-linecap="round"/>
    <circle cx="82" cy="166" r="13" fill="#ffb547"/>
  </g>
  <g opacity=".72" fill="none" stroke="#ff4d64" stroke-width="3">
    <path d="M585 290 C628 262 664 238 706 212"/>
    <path d="M585 398 C648 418 704 432 760 450"/>
    <path d="M592 520 C680 540 752 536 840 514"/>
  </g>
</svg>
