<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-labelledby="title desc">
  <title id="title">Quantum advantage as a benchmark</title>
  <desc id="desc">A short Sycamore sampling-time bar beside a much longer muted classical-estimate bar, next to the parts of the experiment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0a0f1c"/><stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0 H0 V58" fill="none" stroke="#9fb3cf" stroke-width="1" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <rect width="1400" height="788" fill="url(#grid)"/>
  <ellipse cx="470" cy="430" rx="470" ry="280" fill="url(#glow)"/>
  <text x="92" y="92" fill="#22d3ee" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" letter-spacing="5">QUANTUM · BENCHMARK</text>
  <text x="90" y="152" fill="#eef3fb" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="54" font-weight="800">Quantum advantage as a benchmark</text>
  <text x="92" y="198" fill="#93a7c4" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="25">Read Sycamore not as one speed headline but as a systems benchmark.</text>
  <rect x="108" y="256" width="724" height="346" rx="20" fill="#ffffff" fill-opacity="0.035" stroke="#94a3b8" stroke-opacity="0.20" stroke-width="1.5"/>
  <text x="138" y="302" fill="#8ea3bf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">SAMPLING TIME</text>
  <line x1="160" y1="345" x2="160" y2="565" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="2"/>
  <text x="174" y="382" fill="#cdd9ec" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="19" font-weight="700">Sycamore ~200 s</text>
  <rect x="160" y="396" width="150" height="46" rx="9" fill="url(#sig)"/>
  <circle cx="317" cy="419" r="7" fill="#67e8f9"/>
  <text x="174" y="494" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="19" font-weight="700">classical estimate: far longer</text>
  <rect x="160" y="508" width="608" height="46" rx="9" fill="#64748b" fill-opacity="0.45" stroke="#94a3b8" stroke-opacity="0.30" stroke-width="1"/>
  <text x="788" y="538" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" text-anchor="end">&#8594;</text>
  <text x="872" y="302" fill="#67e8f9" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" letter-spacing="3">THE EXPERIMENT</text>
  <rect x="868" y="324" width="424" height="58" rx="14" fill="#67e8f9" fill-opacity="0.09" stroke="#67e8f9" stroke-opacity="0.3"/>
  <circle cx="898" cy="353" r="6" fill="#67e8f9"/>
  <text x="920" y="360" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">53 superconducting qubits</text>
  <rect x="868" y="392" width="424" height="58" rx="14" fill="#67e8f9" fill-opacity="0.09" stroke="#67e8f9" stroke-opacity="0.3"/>
  <circle cx="898" cy="421" r="6" fill="#67e8f9"/>
  <text x="920" y="428" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Random circuit sampling</text>
  <rect x="868" y="460" width="424" height="58" rx="14" fill="#67e8f9" fill-opacity="0.09" stroke="#67e8f9" stroke-opacity="0.3"/>
  <circle cx="898" cy="489" r="6" fill="#67e8f9"/>
  <text x="920" y="496" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Cross-entropy benchmarking</text>
  <rect x="868" y="528" width="424" height="58" rx="14" fill="#67e8f9" fill-opacity="0.09" stroke="#67e8f9" stroke-opacity="0.3"/>
  <circle cx="898" cy="557" r="6" fill="#67e8f9"/>
  <text x="920" y="564" fill="#e3ebf6" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21">Checked vs. classical sim</text>
  <line x1="92" y1="690" x2="1308" y2="690" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1"/>
  <text x="92" y="730" fill="#9fb3cf" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="23">Sycamore turns quantum advantage into <tspan fill="#22d3ee" font-weight="700">a benchmark engineers can measure</tspan>.</text>
</svg>
