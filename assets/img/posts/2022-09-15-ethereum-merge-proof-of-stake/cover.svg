<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Ethereum consensus migration</title>
  <desc id="desc">Two blockchain layers cross a glowing merge seam and resolve into a grid of validator slots and finality checkpoints.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101d"/>
      <stop offset="50%" stop-color="#071a2d"/>
      <stop offset="100%" stop-color="#07140b"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="60%" cy="48%" r="46%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.36"/>
      <stop offset="62%" stop-color="#14532d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06101d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="35%" cy="54%" r="44%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.26"/>
      <stop offset="74%" stop-color="#06101d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="work" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="stake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <rect width="1400" height="800" fill="url(#greenGlow)"/>
  <rect width="1400" height="800" fill="url(#blueGlow)"/>

  <g opacity="0.35" stroke="#94a3b8" stroke-width="1.6" fill="none">
    <path d="M104 210 C296 160 506 198 664 318 C836 448 1048 500 1288 432"/>
    <path d="M110 588 C302 646 520 604 684 482 C856 356 1062 316 1282 372"/>
  </g>

  <g filter="url(#soft)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 300 C292 252 430 276 560 370 C676 454 792 510 956 500 C1088 492 1192 444 1280 386"
          stroke="url(#work)" stroke-width="16" opacity="0.9"/>
    <path d="M122 510 C306 548 454 508 584 418 C700 336 828 296 982 314 C1110 330 1208 378 1282 452"
