      <path d="M218 64 C232 52 242 44 252 40"/>
      <path d="M344 40 C358 48 368 56 378 64"/>
      <path d="M156 198 C170 184 180 174 190 166"/>
      <path d="M282 166 C296 178 306 188 316 198"/>
