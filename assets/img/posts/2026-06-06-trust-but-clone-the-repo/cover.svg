<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img" aria-label="A document checked against a verification seal, with verified, unverified, and falsified badges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a07"/><stop offset="100%" stop-color="#16100a"/>
    </linearGradient>
    <radialGradient id="amberglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.40"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="788" fill="url(#bg)"/>
  <ellipse cx="900" cy="394" rx="460" ry="360" fill="url(#amberglow)"/>

  <!-- document -->
  <g transform="rotate(-5 430 394)">
    <rect x="250" y="180" width="360" height="440" rx="18" fill="#1a140c" stroke="#b4791f" stroke-width="2"/>
    <g fill="#7a5a24"><rect x="294" y="236" width="200" height="14" rx="7"/><rect x="294" y="280" width="272" height="12" rx="6"/><rect x="294" y="312" width="240" height="12" rx="6"/><rect x="294" y="344" width="272" height="12" rx="6"/><rect x="294" y="376" width="180" height="12" rx="6"/></g>
    <rect x="294" y="430" width="220" height="48" rx="10" fill="#7c4a0f" fill-opacity="0.4"/>
    <text x="312" y="462" fill="#fbbf24" font-family="Georgia,serif" font-size="22" font-style="italic">a claim</text>
  </g>

  <!-- verification seal -->
  <g transform="translate(720 300)">
    <circle r="118" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="2 12"/>
    <circle r="92" fill="#1a1206" stroke="#fbbf24" stroke-width="3"/>
    <path d="M-40 6 l26 28 56 -70" fill="none" stroke="#fcd34d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- status triad -->
  <g transform="translate(1040 220)" font-family="Inter,'Segoe UI',sans-serif">
    <g><circle cx="0" cy="0" r="30" fill="#10b981" fill-opacity="0.16" stroke="#34d399" stroke-width="2"/><path d="M-13 0 l9 10 16 -20" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g transform="translate(0 92)"><circle cx="0" cy="0" r="30" fill="#f59e0b" fill-opacity="0.16" stroke="#fbbf24" stroke-width="2"/><text x="0" y="11" text-anchor="middle" fill="#fbbf24" font-size="34" font-weight="700">?</text></g>
    <g transform="translate(0 184)"><circle cx="0" cy="0" r="30" fill="#fb7185" fill-opacity="0.16" stroke="#fb7185" stroke-width="2"/><path d="M-11 -11 l22 22 M11 -11 l-22 22" stroke="#fb7185" stroke-width="5" stroke-linecap="round"/></g>
  </g>
</svg>
